# Streamlit 앱 설정 (Streamlit Community Cloud 배포 호환).
# 본 파일은 git에 포함되어 모든 환경에서 동일 동작을 보장한다.

[server]
# 외부 접근 인증은 코드(core/auth.py) 차원에서 처리 — 본 설정은 일반 동작.
headless = true
enableXsrfProtection = true
# enableCORS는 enableXsrfProtection=true와 충돌하므로 제거 (자동 true).

[browser]
# Streamlit이 사용 통계를 Streamlit 측 서버로 전송하는 기본 동작 비활성화.
gatherUsageStats = false

[theme]
# 공정에너지 톤 — 차분한 색감.
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f7fa"
textColor = "#262730"
font = "sans serif"

[client]
# 사용자 화면에 토글로 보이는 캐싱 안내 등을 줄임.
toolbarMode = "minimal"
showErrorDetails = false
